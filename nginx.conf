server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Security headers
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Main location — SPA-friendly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: CSS/JS/Fonts — долгий кэш (при изменениях меняйте имена файлов)
    location ~* \.(css|js|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache: Изображения
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # index.html — не кэшируем
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Robots & sitemap
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }

    # Блокировка скрытых файлов
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
